name: Generate Snake Animation

on:
  schedule:
    - cron: "0 12 * * *"   # Roda todo dia ao meio-dia UTC
  workflow_dispatch:         # Permite rodar manualmente pelo GitHub
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=purple
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=purple

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
